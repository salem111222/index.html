<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDOM | Futuristic Gaming Portal</title>
    <style>
        :root {
            --neon-color: #00f2ff;
            --accent-purple: #bc13fe;
            --grid-color: rgba(0, 242, 255, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #010a1a;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Nebula Background */
        .wallpaper-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, #0a192f 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #1a0a2f 0%, transparent 40%),
                linear-gradient(135deg, #010a1a 0%, #05162a 50%, #0a192f 100%);
            background-size: 200% 200%;
            animation: nebulaMove 15s ease infinite alternate;
        }

        @keyframes nebulaMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* 3D Moving Grid */
        .cyber-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 70px 70px;
            transform: perspective(700px) rotateX(65deg);
            animation: gridFlow 10s linear infinite;
        }

        @keyframes gridFlow {
            0% { transform: perspective(700px) rotateX(65deg) translateY(0); }
            100% { transform: perspective(700px) rotateX(65deg) translateY(70px); }
        }

        /* REDOM Logo */
        .header {
            position: absolute;
            top: 40px;
            left: 50px;
            z-index: 100;
        }

        .logo {
            color: #fff;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-decoration: none;
            text-transform: uppercase;
            animation: neonFlash 1.5s infinite;
        }

        @keyframes neonFlash {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-color), 0 0 40px var(--neon-color);
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: none;
                opacity: 0.4;
            }
        }

        /* Circular Button Layout */
        .circle-container {
            position: relative;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Central Core Effect */
        .core {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, var(--neon-color) 0%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--neon-color);
            animation: corePulse 2s infinite alternate;
        }

        @keyframes corePulse {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.1); opacity: 1; }
        }

        /* Round Buttons */
        .game-btn {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-color);
            border-radius: 50%; /* Rounded Shape */
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            text-transform: uppercase;
            padding: 10px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* Positioning Buttons in a Circle */
        /* n-th child calculations for a circular layout */
        .game-btn:nth-child(2) { transform: rotate(0deg) translate(220px) rotate(0deg); }
        .game-btn:nth-child(3) { transform: rotate(60deg) translate(220px) rotate(-60deg); }
        .game-btn:nth-child(4) { transform: rotate(120deg) translate(220px) rotate(-120deg); }
        .game-btn:nth-child(5) { transform: rotate(180deg) translate(220px) rotate(-180deg); }
        .game-btn:nth-child(6) { transform: rotate(240deg) translate(220px) rotate(-240deg); }
        .game-btn:nth-child(7) { transform: rotate(300deg) translate(220px) rotate(-300deg); }

        .game-btn:hover {
            background: rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 40px var(--neon-color), inset 0 0 20px var(--neon-color);
            transform: scale(1.2) !important; /* Scale up on hover */
            z-index: 20;
        }

        .game-btn span {
            pointer-events: none;
        }

        /* Particles Overlay */
        .particles-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .circle-container { width: 300px; height: 300px; }
            .game-btn { width: 80px; height: 80px; font-size: 0.6rem; }
            .game-btn:nth-child(2) { transform: rotate(0deg) translate(130px) rotate(0deg); }
            .game-btn:nth-child(3) { transform: rotate(60deg) translate(130px) rotate(-60deg); }
            .game-btn:nth-child(4) { transform: rotate(120deg) translate(130px) rotate(-120deg); }
            .game-btn:nth-child(5) { transform: rotate(180deg) translate(130px) rotate(-180deg); }
            .game-btn:nth-child(6) { transform: rotate(240deg) translate(130px) rotate(-240deg); }
            .game-btn:nth-child(7) { transform: rotate(300deg) translate(130px) rotate(-300deg); }
        }
    </style>
</head>
<body>

    <div class="wallpaper-container">
        <div class="cyber-grid"></div>

    </div>

    <header class="header">

    </header>

        <a href="gesture.html" class="game-btn" style="text-decoration: none;">

</a>

</body>
</html>
