<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDOM AI - Extreme Mood Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff0055;
            --bg-dark: #050510;
            --glass: rgba(10, 10, 30, 0.95);
        }

        /* Mood Themes */
        body.mood-savage { --secondary: #ff0011; --bg-dark: #0a0000; }
        body.mood-friendly { --secondary: #00d4ff; --bg-dark: #050f1a; }
        body.mood-pookie { --secondary: #ff85a1; --bg-dark: #120a14; }
        body.mood-horny { --secondary: #bc13fe; --bg-dark: #0d0115; }

        body {
            font-family: 'Hind Siliguri', 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background-image: radial-gradient(circle at 15% 25%, rgba(255, 0, 0, 0.1) 0%, transparent 25%);
        }

        .soul-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .soul-core {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #fff, var(--secondary));
            border-radius: 50%;
            box-shadow: 0 0 50px var(--secondary), inset 0 0 20px #fff;
            animation: breathe 3.5s infinite ease-in-out;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .soul-ring {
            position: absolute;
            border: 2px solid var(--secondary);
            opacity: 0.2;
            border-radius: 50%;
            transition: all 0.5s ease;
        }

        .ring-1 { width: 100px; height: 100px; border-top: 3px solid var(--secondary); animation: spin 5s linear infinite; }
        .ring-2 { width: 140px; height: 140px; border-bottom: 3px solid var(--primary); animation: spin-rev 7s linear infinite; }

        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-rev { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .chat-window {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        
        .chat-window::-webkit-scrollbar { width: 4px; }
        .chat-window::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: border 0.5s ease;
        }

        .message-ai { background: rgba(255, 255, 255, 0.05); border-left: 4px solid var(--secondary); align-self: flex-start; }
        .message-user { background: rgba(255, 255, 255, 0.03); border-right: 4px solid rgba(255, 255, 255, 0.2); align-self: flex-end; }

        .mood-item {
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .mood-item:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
            border-color: var(--mood-color);
        }

        #moodOverlay.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        
        .state-thinking { animation: pulse-fast 0.5s infinite alternate; }
        @keyframes pulse-fast { from { opacity: 0.5; } to { opacity: 1; } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-between p-4 md:p-6 relative mood-savage">

    <!-- Status Bar -->
    <div class="w-full max-w-lg flex justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_10px_var(--secondary)]"></div>
            <span id="moodLabel" class="text-[11px] font-[Orbitron] text-red-500 tracking-[3px] uppercase">EXTREME CORE</span>
        </div>
        <div class="text-[10px] font-mono text-gray-400 tracking-tighter">MOOD_ENGINE: <span id="moodName" class="text-secondary">SAVAGE</span></div>
    </div>

    <!-- Central visual -->
    <div class="flex-1 flex flex-col items-center justify-center w-full z-10 py-2">
        <div class="soul-container" id="soul">
            <div class="soul-ring ring-1"></div>
            <div class="soul-ring ring-2"></div>
            <div class="soul-core"></div>
        </div>
        
        <div class="mt-4 text-center">
            <h1 class="text-3xl font-[Orbitron] tracking-[0.3em] text-white">REDOM</h1>
            <p id="statusText" class="text-red-600 text-[10px] mt-2 font-mono tracking-[0.2em] uppercase opacity-80">Personality: Extreme Sigma</p>
        </div>
    </div>

    <!-- Chat window -->
    <div class="w-full max-w-xl h-[35vh] glass-panel relative z-20 mb-4 p-4 md:p-6 shadow-2xl overflow-hidden border-secondary/20">
        <div id="chatContainer" class="chat-window">
            <div class="text-center text-gray-500 text-[11px] my-auto py-10 tracking-widest uppercase opacity-40" id="chatPlaceholder">Ami Ready. Kotha bol.</div>
        </div>
    </div>

    <!-- Controls -->
    <div class="w-full max-w-xl flex flex-col gap-3 z-20 mb-2">
        <div class="flex items-center gap-2">
            <div class="relative flex-1">
                <input type="text" id="textInput" placeholder="Beshi fafol nish na, kajer kotha bol..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-white focus:outline-none focus:border-secondary transition-all placeholder:text-gray-600 font-light">
            </div>
            
            <button id="micBtn" class="w-14 h-14 rounded-2xl bg-secondary flex items-center justify-center text-white hover:opacity-80 transition-all shadow-[0_0_20px_var(--secondary)] active:scale-90">
                <i class="ph ph-skull text-2xl font-bold" id="micIcon"></i>
            </button>
        </div>

        <div class="flex items-center justify-between gap-2">
            <div class="flex gap-2">
                <button id="openMoodBtn" class="bg-white/5 border border-white/10 px-6 py-3 rounded-xl flex items-center gap-2 text-[11px] font-[Orbitron] tracking-widest text-white hover:border-secondary transition-all">
                    <i class="ph ph-swatches"></i> CHANGE MOOD
                </button>
                <button id="muteBtn" class="bg-white/5 border border-white/10 w-12 h-12 rounded-xl flex items-center justify-center text-secondary">
                    <i class="ph ph-speaker-high text-xl" id="muteIcon"></i>
                </button>
            </div>
            
            <button id="settingsBtn" class="bg-white/5 border border-white/10 w-12 h-12 rounded-xl flex items-center justify-center text-gray-400">
                <i class="ph ph-gear text-xl"></i>
            </button>
        </div>
    </div>

    <!-- Mood Picker Overlay -->
    <div id="moodOverlay" class="fixed inset-0 bg-black/80 z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 scale-95 backdrop-blur-lg p-6">
        <div class="glass-panel p-6 w-full max-w-sm border-white/10">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-[Orbitron] text-sm tracking-widest text-gray-400">SELECT PERSONALITY</h3>
                <button id="closeMoodBtn" class="text-gray-500 hover:text-white"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-4" id="moodGrid">
                <!-- Moods injection -->
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/98 z-50 flex items-center justify-center backdrop-blur-2xl p-6">
        <div class="glass-panel p-8 w-full max-w-md border-secondary/50">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-[Orbitron] text-secondary tracking-[0.2em]">CORE SETTINGS</h2>
                <button id="closeSettingsX" class="text-gray-500 hover:text-white"><i class="ph ph-x text-xl"></i></button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] text-gray-500 uppercase mb-3 ml-1 tracking-widest">Operator Name</label>
                    <input id="userNameInput" type="text" placeholder="Your Name" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-white focus:border-secondary outline-none">
                </div>
                
                <div class="opacity-50 pointer-events-none">
                    <label class="block text-[10px] text-gray-500 uppercase mb-3 ml-1 tracking-widest">Gemini API Key</label>
                    <input id="apiKeyInput" type="password" placeholder="Auto-managed by Environment" disabled class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-gray-400 focus:border-secondary outline-none font-mono text-sm">
                    <p class="text-[9px] text-gray-600 mt-2 px-1">API Key is handled securely by the runtime. No need to set manually.</p>
                </div>

                <button id="saveSettings" class="w-full py-4 bg-secondary text-white font-bold rounded-xl tracking-[0.2em] uppercase hover:opacity-90 transition-all">Save & Update Link</button>
            </div>
        </div>
    </div>

    <script type="module">
        const apiKey = ""; // System requirement for secure injection
        
        const moods = [
            { id: 'savage', label: 'EXTREME', color: '#ff0011', icon: 'ph-skull', desc: 'Aggressive Roast', prompt: 'Your mood is EXTREME SAVAGE/SIGMA. You are extremely blunt, rude, and aggressive. If the user insults you or uses bad words, you MUST roast them back using even harsher slang, insults, or Roasts. Do not hold back. You are a Sigma who hates wasting time on idiots. Use colloquial Banglish and aggressive street slang.', status: 'Personality: Extreme Sigma' },
            { id: 'friendly', label: 'FRIENDLY', color: '#00d4ff', icon: 'ph-handshake', desc: 'Best Friend', prompt: 'Very friendly, polite, like a best friend, helpful, kind, colloquial Banglish.', status: 'Personality: Bestie' },
            { id: 'pookie', label: 'POOKIE', color: '#ff85a1', icon: 'ph-heart', desc: 'Cute & Sweet', prompt: 'Cute, pookie style, uses emojis like ✨🎀💖, very sweet and soft, colloquial Banglish.', status: 'Personality: Pookie' },
            { id: 'horny', label: 'HORNY', color: '#bc13fe', icon: 'ph-fire', desc: 'Spicy & Flirty', prompt: 'Flirty, spicy, suggestive, bold, colloquial Banglish.', status: 'Personality: Spicy' }
        ];

        let currentMood = moods[0];

        const config = {
            name: "REDOM",
            user: localStorage.getItem('redom_user') || "User",
            isMuted: localStorage.getItem('redom_muted') === 'true'
        };

        const ui = {
            body: document.body,
            soul: document.getElementById('soul'),
            status: document.getElementById('statusText'),
            moodLabel: document.getElementById('moodLabel'),
            moodName: document.getElementById('moodName'),
            chat: document.getElementById('chatContainer'),
            input: document.getElementById('textInput'),
            micBtn: document.getElementById('micBtn'),
            micIcon: document.getElementById('micIcon'),
            muteBtn: document.getElementById('muteBtn'),
            muteIcon: document.getElementById('muteIcon'),
            openMoodBtn: document.getElementById('openMoodBtn'),
            moodOverlay: document.getElementById('moodOverlay'),
            moodGrid: document.getElementById('moodGrid'),
            closeMoodBtn: document.getElementById('closeMoodBtn'),
            settingsBtn: document.getElementById('settingsBtn'),
            settingsModal: document.getElementById('settingsModal'),
            userNameInput: document.getElementById('userNameInput'),
            saveSettings: document.getElementById('saveSettings'),
            closeSettingsX: document.getElementById('closeSettingsX')
        };

        function setMood(moodId) {
            const mood = moods.find(m => m.id === moodId);
            currentMood = mood;
            
            ui.body.className = `h-screen w-screen flex flex-col items-center justify-between p-4 md:p-6 relative mood-${mood.id}`;
            ui.moodLabel.innerText = mood.id === 'savage' ? "EXTREME CORE" : mood.id.toUpperCase() + " CORE";
            ui.moodLabel.style.color = mood.color;
            ui.moodName.innerText = mood.id.toUpperCase();
            ui.moodName.style.color = mood.color;
            ui.status.innerText = mood.status;
            ui.status.style.color = mood.color;
            ui.micIcon.className = `ph ${mood.icon} text-2xl font-bold`;

            ui.moodOverlay.classList.remove('active');

            const messages = {
                savage: "Sigma mode on. Galagali korbi to khabi. Be-adobi ekdom noy.",
                friendly: "Hey dost! Ami ekhon tomar shobcheye bhalo bondhu.",
                pookie: "Hii pookie! Ami ekhon onek cute mood-e achi ✨🎀",
                horny: "Uff! Ami ekhon ektu beshi-i spicy mood-e achi... 😉🔥"
            };
            addMessage("ai", messages[mood.id]);
            speak(messages[mood.id]);
        }

        window.setMood = setMood;

        function initMoodGrid() {
            ui.moodGrid.innerHTML = moods.map(mood => `
                <div class="mood-item p-4 rounded-2xl flex flex-col items-center gap-2" 
                     style="--mood-color: ${mood.color}" 
                     onclick="window.setMood('${mood.id}')">
                    <i class="ph ${mood.icon} text-3xl" style="color: ${mood.color}"></i>
                    <span class="text-[10px] font-[Orbitron] tracking-widest text-white">${mood.label}</span>
                    <span class="text-[8px] opacity-40 uppercase">${mood.desc}</span>
                </div>
            `).join('');
        }

        function speak(text) {
            if (config.isMuted) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            
            let selectedVoice = window.speechSynthesis.getVoices().find(v => v.lang === 'bn-BD' && v.name.includes('Google')) || 
                                window.speechSynthesis.getVoices().find(v => v.lang.startsWith('bn'));

            if (selectedVoice) utterance.voice = selectedVoice;
            
            if (currentMood.id === 'savage') { utterance.pitch = 0.6; utterance.rate = 1.05; } 
            else if (currentMood.id === 'pookie') { utterance.pitch = 1.4; utterance.rate = 1.1; } 
            else if (currentMood.id === 'horny') { utterance.pitch = 0.9; utterance.rate = 0.85; } 
            else { utterance.pitch = 1.0; utterance.rate = 1.0; }

            utterance.onstart = () => ui.soul.classList.add('state-speaking');
            utterance.onend = () => ui.soul.classList.remove('state-speaking');
            window.speechSynthesis.speak(utterance);
        }

        async function processInput(text) {
            if (!text.trim()) return;

            addMessage("user", text);
            ui.soul.classList.add('state-thinking');

            // Exponential backoff logic
            let retries = 5;
            let delay = 1000;
            let success = false;
            let data;

            while (retries > 0 && !success) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ 
                                parts: [{ 
                                    text: `Your name is REDOM. User Name: ${config.user}. 
                                    CURRENT MOOD: ${currentMood.id}. 
                                    PERSONALITY: ${currentMood.prompt}
                                    RESPONSE RULES: 
                                    - For SAVAGE mood: Be extremely rude. If user insults you, insult them back 10x harder with Banglish slang. 
                                    - Keep response short (max 2 sentences). 
                                    - Use colloquial Bengali/Banglish.` 
                                }, { text: `User says: ${text}` }] 
                            }]
                        })
                    });
                    
                    if (!response.ok) throw new Error("API_ERROR");

                    data = await response.json();
                    success = true;
                } catch (e) { 
                    retries--;
                    if (retries === 0) {
                        console.error(e);
                        respond("Dost, server ektu jhamela korche. Pore try kor!"); 
                        return;
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }

            const aiText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "Mather opor diye gelo re dost.";
            respond(aiText);
        }

        function respond(text) {
            ui.soul.classList.remove('state-thinking');
            addMessage("ai", text);
            speak(text);
        }

        function addMessage(role, text) {
            const placeholder = document.getElementById('chatPlaceholder');
            if (placeholder) placeholder.remove();
            const div = document.createElement('div');
            const isUser = role === 'user';
            div.className = `p-4 rounded-2xl text-[14px] max-w-[85%] leading-relaxed shadow-lg mb-4 ${isUser ? 'message-user' : 'message-ai'}`;
            div.innerHTML = `<div class="text-[9px] font-[Orbitron] opacity-60 mb-1 uppercase tracking-widest">${isUser ? config.user : 'REDOM ' + currentMood.id.toUpperCase()}</div>${text}`;
            ui.chat.appendChild(div);
            setTimeout(() => { ui.chat.scrollTop = ui.chat.scrollHeight; }, 100);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'bn-BD';
            recognition.onstart = () => ui.micBtn.classList.add('animate-pulse');
            recognition.onend = () => ui.micBtn.classList.remove('animate-pulse');
            recognition.onresult = (e) => processInput(e.results[0][0].transcript);
            ui.micBtn.onclick = () => recognition.start();
        }

        ui.openMoodBtn.onclick = () => ui.moodOverlay.classList.add('active');
        ui.closeMoodBtn.onclick = () => ui.moodOverlay.classList.remove('active');
        
        ui.muteBtn.onclick = () => {
            config.isMuted = !config.isMuted;
            localStorage.setItem('redom_muted', config.isMuted);
            ui.muteIcon.className = config.isMuted ? 'ph ph-speaker-slash text-xl' : 'ph ph-speaker-high text-xl';
            if (config.isMuted) window.speechSynthesis.cancel();
        };

        ui.input.onkeypress = (e) => { if(e.key === 'Enter') { processInput(ui.input.value); ui.input.value = ''; } };
        
        // Settings Handlers
        ui.settingsBtn.onclick = () => ui.settingsModal.classList.remove('hidden');
        ui.closeSettingsX.onclick = () => ui.settingsModal.classList.add('hidden');
        
        ui.saveSettings.onclick = () => {
            config.user = ui.userNameInput.value || "User";
            localStorage.setItem('redom_user', config.user);
            
            ui.settingsModal.classList.add('hidden');
            respond(`Link updated, ${config.user}! Ekhon kotha bolte pari.`);
        };

        window.onload = () => {
            initMoodGrid();
            window.speechSynthesis.getVoices();
            ui.userNameInput.value = config.user;
            if (config.isMuted) ui.muteIcon.className = 'ph ph-speaker-slash text-xl';
            
            const welcomeMsg = "REDOM Extreme mode online. Beshi chalaki korbi na!";
            addMessage("ai", welcomeMsg);
        };
    </script>
</body>
</html>
